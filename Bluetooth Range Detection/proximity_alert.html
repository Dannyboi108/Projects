<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Proximity Alert</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0c;
    --surface: #141414;
    --border: #222;
    --amber: #f59e0b;
    --amber-dim: #78490a;
    --red: #ef4444;
    --green: #22c55e;
    --text: #d4d4d4;
    --muted: #555;
    --font-mono: 'Share Tech Mono', monospace;
    --font-display: 'Bebas Neue', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
    overflow-x: hidden;
  }

  /* ── scanline overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  header {
    width: 100%;
    max-width: 420px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
    margin-bottom: 28px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 2.4rem;
    letter-spacing: 0.04em;
    color: #fff;
    line-height: 1;
  }
  .logo span { color: var(--amber); }

  .version {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    padding-bottom: 4px;
  }

  /* ── radar display ── */
  .radar-wrap {
    position: relative;
    width: 240px;
    height: 240px;
    margin: 0 auto 32px;
  }
  #radarCanvas {
    border-radius: 50%;
    display: block;
  }

  /* ── status card ── */
  .card {
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 16px 20px;
    margin-bottom: 12px;
  }

  .card-label {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .dot.alert { background: var(--red); box-shadow: 0 0 10px var(--red); animation: blink 0.5s infinite; }

  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

  .status-text {
    font-size: 0.85rem;
    color: var(--text);
  }

  /* distance display */
  .distance-display {
    font-family: var(--font-display);
    font-size: 4rem;
    letter-spacing: 0.05em;
    color: var(--amber);
    line-height: 1;
    transition: color 0.3s;
  }
  .distance-display.danger { color: var(--red); }
  .distance-unit {
    font-size: 1rem;
    color: var(--muted);
    margin-left: 4px;
    font-family: var(--font-mono);
  }

  /* threshold bar */
  .threshold-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    font-size: 0.7rem;
    color: var(--muted);
  }
  .bar-track {
    width: 100%;
    height: 4px;
    background: #1e1e1e;
    border-radius: 2px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s, background 0.3s;
  }
  .bar-fill.danger { background: var(--red); }

  /* log */
  .log-area {
    font-size: 0.72rem;
    color: var(--muted);
    line-height: 1.8;
    max-height: 120px;
    overflow-y: auto;
    scrollbar-width: none;
  }
  .log-area::-webkit-scrollbar { display: none; }
  .log-entry { border-bottom: 1px solid #181818; padding: 2px 0; }
  .log-entry.alert-log { color: var(--red); }
  .log-entry.info-log { color: var(--amber); }

  /* alert flash */
  .alert-banner {
    width: 100%;
    max-width: 420px;
    background: var(--red);
    color: #fff;
    font-family: var(--font-display);
    font-size: 1.4rem;
    letter-spacing: 0.1em;
    text-align: center;
    padding: 14px;
    border-radius: 2px;
    margin-bottom: 12px;
    display: none;
    animation: flashIn 0.3s ease;
  }
  .alert-banner.show { display: block; }
  @keyframes flashIn { from { opacity:0; transform: scale(0.97); } to { opacity:1; transform: scale(1); } }

  /* buttons */
  .btn {
    width: 100%;
    max-width: 420px;
    padding: 16px;
    border: 1px solid var(--amber-dim);
    background: transparent;
    color: var(--amber);
    font-family: var(--font-mono);
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s, color 0.2s;
    margin-bottom: 10px;
  }
  .btn:hover, .btn:active { background: var(--amber); color: #000; }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn.disconnect {
    border-color: #3a1a1a;
    color: var(--red);
    display: none;
  }
  .btn.disconnect:hover, .btn.disconnect:active { background: var(--red); color: #fff; }

  .note {
    font-size: 0.65rem;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.05em;
    margin-top: 8px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<header>
  <div class="logo">PROX<span>.</span>ALERT</div>
  <div class="version">v1.0 · BLE 4.0</div>
</header>

<!-- Radar -->
<div class="radar-wrap">
  <canvas id="radarCanvas" width="240" height="240"></canvas>
</div>

<!-- Alert Banner -->
<div class="alert-banner" id="alertBanner">🚨 OBJECT DETECTED</div>

<!-- Connection Status -->
<div class="card">
  <div class="card-label">Connection</div>
  <div class="status-row">
    <div class="dot" id="connDot"></div>
    <div class="status-text" id="connText">Not connected</div>
  </div>
</div>

<!-- Distance -->
<div class="card">
  <div class="card-label">Distance</div>
  <div>
    <span class="distance-display" id="distDisplay">--</span>
    <span class="distance-unit">cm</span>
  </div>
  <div style="margin-top:12px">
    <div class="threshold-row">
      <span>0 cm</span>
      <span>THRESHOLD: 30cm</span>
      <span>200 cm</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" id="barFill"></div>
    </div>
  </div>
</div>

<!-- Log -->
<div class="card">
  <div class="card-label">Event Log</div>
  <div class="log-area" id="logArea">
    <div class="log-entry">-- waiting for connection --</div>
  </div>
</div>

<!-- Buttons -->
<button class="btn" id="connectBtn" onclick="connectBLE()">⬡ Connect to BT05</button>
<button class="btn disconnect" id="disconnectBtn" onclick="disconnectBLE()">✕ Disconnect</button>

<div class="note">
  Requires Chrome on Android · Keep screen on while monitoring<br>
  BLE device name: <strong>BT05</strong> or <strong>HMSoft</strong>
</div>

<script>
const SERVICE_UUID        = '0000ffe0-0000-1000-8000-00805f9b34fb';
const CHARACTERISTIC_UUID = '0000ffe1-0000-1000-8000-00805f9b34fb';

let device, characteristic;
let buffer = '';
let alertTimeout = null;
let closeStartTime = null;
let alertFired = false;
let currentDist = null;
let connected = false;

// DOM refs
const connDot       = document.getElementById('connDot');
const connText      = document.getElementById('connText');
const distDisplay   = document.getElementById('distDisplay');
const barFill       = document.getElementById('barFill');
const logArea       = document.getElementById('logArea');
const alertBanner   = document.getElementById('alertBanner');
const connectBtn    = document.getElementById('connectBtn');
const disconnectBtn = document.getElementById('disconnectBtn');

// ── CANVAS RADAR ──────────────────────────────────────────
const canvas = document.getElementById('radarCanvas');
const ctx    = canvas.getContext('2d');
const CX = 120, CY = 120, R = 110;
const MAX_DIST = 200; // cm mapped to full radar radius
const SWEEP_SPEED = 0.018; // radians per frame

let sweepAngle = -Math.PI / 2;
let blips = []; // { angle, dist, alpha }

function drawRadar() {
  ctx.clearRect(0, 0, 240, 240);

  // Background
  ctx.beginPath();
  ctx.arc(CX, CY, R, 0, Math.PI * 2);
  ctx.fillStyle = '#0a0f0a';
  ctx.fill();

  // Outer border
  ctx.beginPath();
  ctx.arc(CX, CY, R, 0, Math.PI * 2);
  ctx.strokeStyle = '#1a3a1a';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Rings with labels
  const rings = [
    { r: R * 0.25, label: '50cm' },
    { r: R * 0.5,  label: '100cm' },
    { r: R * 0.75, label: '150cm' },
    { r: R,        label: '200cm' },
  ];
  rings.forEach(({ r, label }) => {
    ctx.beginPath();
    ctx.arc(CX, CY, r, 0, Math.PI * 2);
    ctx.strokeStyle = r === R * 0.15 ? '#2a5a2a' : '#162616';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = '#2a4a2a';
    ctx.font = '8px Share Tech Mono, monospace';
    ctx.fillText(label, CX + r + 2, CY - 2);
  });

  // 30cm threshold ring (highlight)
  const threshR = (30 / MAX_DIST) * R;
  ctx.beginPath();
  ctx.arc(CX, CY, threshR, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(239,68,68,0.4)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 4]);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(239,68,68,0.5)';
  ctx.font = '8px Share Tech Mono, monospace';
  ctx.fillText('30cm', CX + threshR + 2, CY - 2);

  // Crosshairs
  ctx.strokeStyle = '#162616';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(CX, CY - R); ctx.lineTo(CX, CY + R);
  ctx.moveTo(CX - R, CY); ctx.lineTo(CX + R, CY);
  ctx.stroke();

  // Diagonal lines
  ctx.beginPath();
  ctx.moveTo(CX - R * 0.707, CY - R * 0.707);
  ctx.lineTo(CX + R * 0.707, CY + R * 0.707);
  ctx.moveTo(CX + R * 0.707, CY - R * 0.707);
  ctx.lineTo(CX - R * 0.707, CY + R * 0.707);
  ctx.stroke();

  if (connected) {
    // Sweep trail (gradient wedge)
    const trailLength = Math.PI * 0.6;
    for (let i = 0; i < 60; i++) {
      const a = sweepAngle - (i / 60) * trailLength;
      const alpha = (1 - i / 60) * 0.18;
      ctx.beginPath();
      ctx.moveTo(CX, CY);
      ctx.arc(CX, CY, R, a - 0.05, a + 0.05);
      ctx.closePath();
      ctx.fillStyle = `rgba(34,197,94,${alpha})`;
      ctx.fill();
    }

    // Sweep arm
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.lineTo(CX + R * Math.cos(sweepAngle), CY + R * Math.sin(sweepAngle));
    ctx.strokeStyle = 'rgba(34,197,94,0.9)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Blips — fade out over time
    blips = blips.filter(b => b.alpha > 0.02);
    blips.forEach(b => {
      const bx = CX + b.r * Math.cos(b.angle);
      const by = CY + b.r * Math.sin(b.angle);
      const color = b.dist <= 30 ? `rgba(239,68,68,${b.alpha})` : `rgba(34,197,94,${b.alpha})`;
      const glowColor = b.dist <= 30 ? `rgba(239,68,68,${b.alpha * 0.3})` : `rgba(34,197,94,${b.alpha * 0.3})`;

      // Glow
      ctx.beginPath();
      ctx.arc(bx, by, 8, 0, Math.PI * 2);
      ctx.fillStyle = glowColor;
      ctx.fill();

      // Dot
      ctx.beginPath();
      ctx.arc(bx, by, 4, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();

      b.alpha -= 0.004; // fade speed
    });

    // Spawn new blip at sweep position if object detected
    if (currentDist !== null && currentDist <= MAX_DIST) {
      // Check if sweep just passed over the "front" direction (-PI/2)
      // We spawn blip at sweep angle with correct distance
      const blipR = Math.min((currentDist / MAX_DIST) * R, R - 4);
      // Spawn every time sweep completes a check zone near top
      blips.push({ angle: sweepAngle, r: blipR, dist: currentDist, alpha: 1.0 });
    }

    sweepAngle += SWEEP_SPEED;
    if (sweepAngle > Math.PI * 1.5) sweepAngle -= Math.PI * 2;
  }

  // Center dot
  ctx.beginPath();
  ctx.arc(CX, CY, 3, 0, Math.PI * 2);
  ctx.fillStyle = connected ? '#22c55e' : '#333';
  ctx.fill();

  // Clip to circle
  ctx.save();
  ctx.beginPath();
  ctx.arc(CX, CY, R, 0, Math.PI * 2);
  ctx.clip();
  ctx.restore();

  requestAnimationFrame(drawRadar);
}
drawRadar();

// ── HELPERS ──────────────────────────────────────────────
function log(msg, type = '') {
  const entry = document.createElement('div');
  entry.className = 'log-entry' + (type ? ' ' + type : '');
  const time = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  entry.textContent = `[${time}] ${msg}`;
  logArea.insertBefore(entry, logArea.firstChild);
  while (logArea.children.length > 30) logArea.removeChild(logArea.lastChild);
}

function setConnected(state) {
  connected = state;
  if (state) {
    connDot.className = 'dot connected';
    connText.textContent = 'Connected · ' + (device?.name || 'BT05');
    connectBtn.style.display = 'none';
    disconnectBtn.style.display = 'block';
  } else {
    connDot.className = 'dot';
    connText.textContent = 'Not connected';
    currentDist = null;
    blips = [];
    distDisplay.textContent = '--';
    distDisplay.classList.remove('danger');
    barFill.style.width = '0%';
    barFill.classList.remove('danger');
    connectBtn.style.display = 'block';
    disconnectBtn.style.display = 'none';
  }
}

function updateDistance(dist) {
  currentDist = dist;
  distDisplay.textContent = dist.toFixed(1);
  const pct = Math.min((dist / 200) * 100, 100);
  barFill.style.width = pct + '%';

  if (dist <= 30) {
    distDisplay.classList.add('danger');
    barFill.classList.add('danger');

    if (closeStartTime === null) {
      closeStartTime = Date.now();
      alertFired = false;
      log('Object in range — starting 5s timer', 'info-log');
    }
    if (!alertFired && Date.now() - closeStartTime >= 5000) {
      alertFired = true;
      triggerAlert();
    }
  } else {
    if (closeStartTime !== null) log('Object left range — timer reset');
    closeStartTime = null;
    alertFired = false;
    distDisplay.classList.remove('danger');
    barFill.classList.remove('danger');
  }
}

function triggerAlert() {
  alertBanner.classList.add('show');
  connDot.className = 'dot alert';
  if (Notification.permission === 'granted') {
    new Notification('🚨 Proximity Alert', { body: 'Object within 30cm for 5 seconds!' });
  }
  if (navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 300]);
  log('🚨 ALERT — object in range for 5s', 'alert-log');
  clearTimeout(alertTimeout);
  alertTimeout = setTimeout(() => {
    alertBanner.classList.remove('show');
    if (connDot.classList.contains('alert')) connDot.className = 'dot connected';
  }, 4000);
}

function onData(event) {
  buffer += new TextDecoder().decode(event.target.value);
  let lines = buffer.split('\n');
  buffer = lines.pop();
  for (const line of lines) {
    const match = line.trim().match(/Distance:\s*([\d.]+)/i);
    if (match) {
      updateDistance(parseFloat(match[1]));
    }
  }
}

async function connectBLE() {
  if (!navigator.bluetooth) {
    alert('Web Bluetooth not supported.\nUse Chrome on Android.');
    return;
  }
  if (Notification.permission === 'default') await Notification.requestPermission();
  try {
    connectBtn.textContent = '⟳ Scanning...';
    connectBtn.disabled = true;
    device = await navigator.bluetooth.requestDevice({
      filters: [{ name: 'BT05' }, { name: 'HMSoft' }, { name: 'AT-09' }],
      optionalServices: [SERVICE_UUID]
    });
    log('Found: ' + device.name, 'info-log');
    device.addEventListener('gattserverdisconnected', () => {
      setConnected(false);
      log('Disconnected', 'alert-log');
    });
    const server     = await device.gatt.connect();
    const service    = await server.getPrimaryService(SERVICE_UUID);
    characteristic   = await service.getCharacteristic(CHARACTERISTIC_UUID);
    await characteristic.startNotifications();
    characteristic.addEventListener('characteristicvaluechanged', onData);
    setConnected(true);
    log('Connected to ' + device.name, 'info-log');
  } catch (err) {
    log('Error: ' + err.message, 'alert-log');
    connectBtn.textContent = '⬡ Connect to BT05';
    connectBtn.disabled = false;
  }
}

async function disconnectBLE() {
  if (device && device.gatt.connected) await device.gatt.disconnect();
  setConnected(false);
}

if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(() => {});
</script>

</body>
</html>
